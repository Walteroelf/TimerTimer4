<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Eieruhr – Arbeitszeit & Auszeit</title>
  <style>
    :root{
      color-scheme: light dark;
      --bg:#f6f7fb;
      --fg:#0f172a;
      --fg-soft:#334155;
      --card:#fff;
      --shadow:0 6px 18px rgba(0,0,0,.06);
      --red:#ef4444;   /* ROT = Arbeitszeit (hinteres Segment) */
      --green:#16a34a; /* GRÜN = Auszeit (vorderes Segment) */
      --black:#111;
      --blue:#2563eb;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0b1221;
        --fg:#e5e7eb;
        --fg-soft:#94a3b8;
        --card:#0f172a;
        --shadow:none;
      }
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      padding: env(safe-area-inset-top) 6px env(safe-area-inset-bottom);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--fg);
      display:flex;
      align-items:center;
      justify-content:center;
      -webkit-tap-highlight-color: transparent;
    }
    .layout{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns: 2fr 1fr;
      gap:10px;
    }
    /* Linke Seite: Uhr */
    .dialCard{
      background:var(--card);
      border-radius:14px;
      padding:10px;
      box-shadow:var(--shadow);
      display:grid;
      gap:8px;
    }
    .dialWrap{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
    }
    .dial{
      width:min(84vw, 620px);
      height:min(84vw, 620px);
      touch-action:none;
      color:var(--fg);
    }
    .startBtn{
      justify-self:center;
      padding:12px 20px;
      border:none;
      border-radius:12px;
      font-weight:800;
      font-size:1.1rem;
      background:#2563eb;
      color:#fff;
      cursor:pointer;
    }
    .btnRow{
      display:flex;
      gap:8px;
      justify-content:center;
      flex-wrap:wrap;
    }
    .startBtn.ghost{
      background:#eef2ff;
      color:#111;
    }
    @media (prefers-color-scheme: dark){
      .startBtn.ghost{
        background:#1f2937;
        color:#e5e7eb;
      }
    }
    /* Rechte Seite: Auszeit-Karte (grün) */
    .sideCard{
      background:var(--card);
      border-radius:14px;
      padding:10px;
      box-shadow:var(--shadow);
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:10px;
      align-items:center;
      justify-items:center;
    }
    .bigStep{
      width:92px;
      height:92px;
      border-radius:14px;
      font-size:2.2rem;
      font-weight:800;
      border:none;
      background:#eef2ff;
      color:#111;
      cursor:pointer;
      touch-action:manipulation;
      user-select:none;
    }
    .clockCard{
      width:180px;
      height:230px;
      border:2px solid #000;
      border-radius:12px;
      background:#fff;
      display:grid;
      align-items:center;
      justify-items:center;
      position:relative;
    }
    .clockFace{
      width:150px;
      height:150px;
    }
    .clockNum{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:3.6rem;
      font-weight:800;
      color:#000;
    }
  </style>
</head>
<body>
  <div class="layout" aria-label="Timer Oberfläche">
    <!-- Linke Hälfte: 60‑Min‑Uhr -->
    <div class="dialCard">
      <div class="dialWrap">
        <svg id="dial" class="dial" viewBox="0 0 220 220" role="img" aria-label="Eieruhr mit 60‑Minuten‑Skala">
          <!-- Zifferblatt und Ticks (ruhig) -->
          <circle cx="110" cy="110" r="104" fill="currentColor" opacity="0.06"/>
          <circle cx="110" cy="110" r="100" fill="#fff" stroke="currentColor" stroke-width="3"/>
          <g id="ticks"></g>

          <!-- Segmente: GRÜN (Auszeit, vorn) + ROT (Arbeitszeit, hinten) -->
          <path id="arcGreen" fill="var(--green)" opacity="0.92"/>
          <path id="arcRed" fill="var(--red)" opacity="0.92"/>

          <!-- Innerer Kreis: kräftig wie Segmente, Farbe je Phase -->
          <circle id="innerFill" cx="110" cy="110" r="72" fill="transparent" opacity="0.92"/>

          <!-- Zentrum: Label (GROSSBUCHSTABEN) + Countdown MM•SS -->
          <text id="centerLabel" x="110" y="98" text-anchor="middle" style="font: 800 18px/1.1 ui-sans-serif, system-ui, -apple-system, Segoe UI; fill: #fff;">
            ARBEITSZEIT
          </text>

          <!-- Minuten links, Sekunden rechts -->
          <text id="centerMin" x="100" y="126" text-anchor="end" style="font: 800 30px/1 ui-monospace, SFMono-Regular, Menlo, monospace; fill: #fff; letter-spacing:0.5px;">
            00
          </text>
          <text id="centerSec" x="120" y="126" text-anchor="start" style="font: 800 30px/1 ui-monospace, SFMono-Regular, Menlo, monospace; fill: #fff; letter-spacing:0.5px;">
            00
          </text>

          <!-- „Doppelpunkt“ als zwei gleich große Punkte -->
          <circle id="dotTop" cx="110" cy="120" r="3" fill="#fff"/>
          <circle id="dotBottom" cx="110" cy="132" r="3" fill="#fff"/>

          <!-- Griffe: schwarz = Ende GRÜN (Grenze), blau = Ende Gesamt -->
          <circle id="handleBoundary" r="10" fill="var(--black)" stroke="#fff" stroke-width="3" style="display:none" />
          <circle id="handleTotal" r="10" fill="var(--blue)" stroke="#fff" stroke-width="3" style="display:none" />

          <!-- Innenkreis-Ring -->
          <circle cx="110" cy="110" r="72" fill="transparent" stroke="currentColor" stroke-width="2"/>
          <!-- Mittelpunkt-Punkt entfernt -->
        </svg>
      </div>

      <!-- Start + Reset -->
      <div class="btnRow">
        <button id="startBtn" class="startBtn" aria-label="Start/Pause">Start</button>
        <button id="resetBtn" class="startBtn ghost" aria-label="Zurücksetzen auf 30/7">Reset</button>
      </div>
    </div>

    <!-- Rechte Hälfte: Auszeit (grün) einstellen -->
    <div class="sideCard" aria-label="Auszeit einstellen">
      <button id="breakPlus" class="bigStep" aria-label="Auszeit plus 1 Minute">+</button>
      <div class="clockCard" aria-live="polite" title="Auszeit (grün)">
        <svg class="clockFace" viewBox="0 0 100 100" aria-hidden="true">
          <circle cx="50" cy="50" r="45" stroke="#000" stroke-width="3" fill="none"/>
          <g stroke="#000" stroke-width="2.5" opacity="0.9">
            <line x1="50" y1="8" x2="50" y2="16"/>
            <line x1="50" y1="84" x2="50" y2="92"/>
            <line x1="8" y1="50" x2="16" y2="50"/>
            <line x1="84" y1="50" x2="92" y2="50"/>
          </g>
          <g stroke="#000" stroke-width="1.6" opacity="0.7">
            <line x1="23" y1="23" x2="28" y2="28"/>
            <line x1="72" y1="72" x2="77" y2="77"/>
            <line x1="23" y1="77" x2="28" y2="72"/>
            <line x1="72" y1="28" x2="77" y2="23"/>
          </g>
        </svg>
        <div id="breakBig" class="clockNum">10</div>
      </div>
      <button id="breakMinus" class="bigStep" aria-label="Auszeit minus 1 Minute">−</button>
    </div>
  </div>

  <script>
    // DOM
    const dial = document.getElementById('dial');
    const ticksG = document.getElementById('ticks');
    const arcGreen = document.getElementById('arcGreen'); // GRÜN = Auszeit (vorn)
    const arcRed = document.getElementById('arcRed');     // ROT = Arbeitszeit (hinten)
    const innerFill = document.getElementById('innerFill');
    const handleBoundary = document.getElementById('handleBoundary'); // schwarzer Griff = Ende GRÜN
    const handleTotal = document.getElementById('handleTotal');       // blauer Griff = Ende Gesamt
    const centerLabel = document.getElementById('centerLabel');
    const centerMin = document.getElementById('centerMin');
    const centerSec = document.getElementById('centerSec');
    const dotTop = document.getElementById('dotTop');
    const dotBottom = document.getElementById('dotBottom');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const breakPlus = document.getElementById('breakPlus');
    const breakMinus = document.getElementById('breakMinus');
    const breakBig = document.getElementById('breakBig');

    // Persist
    let initialBreak = 10, initialTotal = 45;
    try{
      const saved = JSON.parse(localStorage.getItem('ttHandles')||'{}');
      if(Number.isFinite(saved.breakMin)) initialBreak = saved.breakMin;
      if(Number.isFinite(saved.totalMin)) initialTotal = Math.min(60, Math.max(1, saved.totalMin));
    }catch{}

    function save(){
      localStorage.setItem('ttHandles', JSON.stringify({
        breakMin: Math.floor(state.breakSec/60),
        totalMin: Math.floor(state.totalSec/60)
      }));
    }

    // State
    const state = {
      totalSec: Math.min(60, Math.max(1, initialTotal))*60, // 1..60 Min
      breakSec: 0, // GRÜN (Auszeit)
      workSec: 0,  // ROT (Arbeitszeit)
      started:false,
      running:false,
      t0:0,
      pausedAcc:0,
      pauseStart:0,
      lastPhase:'work' // 'work' | 'break' | 'done'
    };
    state.breakSec = Math.min(initialBreak*60, state.totalSec);
    state.workSec = state.totalSec - state.breakSec;
    breakBig.textContent = Math.floor(state.breakSec/60);

    // Ticks (ruhig)
    (function drawTicks(){
      const cx=110, cy=110, rOuter=100, long=12, short=6;
      for(let i=0;i<60;i++){
        const angle=i*6, rad=(angle-90)*Math.PI/180;
        const len=(i%5===0)? long : short;
        const x1=cx+(rOuter-len)*Math.cos(rad), y1=cy+(rOuter-len)*Math.sin(rad);
        const x2=cx+rOuter*Math.cos(rad), y2=cy+rOuter*Math.sin(rad);
        const line=document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1',x1.toFixed(2));
        line.setAttribute('y1',y1.toFixed(2));
        line.setAttribute('x2',x2.toFixed(2));
        line.setAttribute('y2',y2.toFixed(2));
        line.setAttribute('stroke','currentColor');
        line.setAttribute('stroke-width', i%5===0 ? '2':'1');
        line.setAttribute('opacity', i%5===0 ? '0.65':'0.45');
        ticksG.appendChild(line);
      }
    })();

    // Helpers
    const clamp=(n,min,max)=>Math.max(min,Math.min(max,n));

    function angleFromPointer(e){
      e.preventDefault();
      const rect=dial.getBoundingClientRect();
      const x=e.clientX - (rect.left + rect.width/2);
      const y=e.clientY - (rect.top + rect.height/2);
      let deg = (Math.atan2(y,x)*180/Math.PI)+90;
      if(deg<0) deg+=360;
      return deg; // 0° oben
    }

    function polar(cx,cy,r,deg){
      const a=(deg-90)*Math.PI/180;
      return {x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)};
    }

    function sectorPath(cx,cy,rO,rI,startDeg,endDeg){
      if(endDeg<=startDeg) return '';
      const large=(endDeg-startDeg)>180?1:0;
      const p1=polar(cx,cy,rO,startDeg), p2=polar(cx,cy,rO,endDeg);
      const p3=polar(cx,cy,rI,endDeg), p4=polar(cx,cy,rI,startDeg);
      return `M ${p1.x} ${p1.y} A ${rO} ${rO} 0 ${large} 1 ${p2.x} ${p2.y} L ${p3.x} ${p3.y} A ${rI} ${rI} 0 ${large} 0 ${p4.x} ${p4.y} Z`;
    }

    function currentElapsed(){
      if(!state.started) return 0;
      const now=Date.now();
      const paused = state.running ? state.pausedAcc : (state.pausedAcc + (state.pauseStart ? (now - state.pauseStart) : 0));
      return clamp(Math.floor((now - state.t0 - paused)/1000), 0, state.totalSec);
    }

    function fmtMMSS(s){
      s=Math.max(0,Math.floor(s));
      const m=Math.floor(s/60),sec=s%60;
      return [String(m).padStart(2,'0'), String(sec).padStart(2,'0')];
    }

    // Phase ermitteln
    function getPhase(elapsed){
      if(elapsed < state.workSec) return 'work';
      if(elapsed < state.totalSec) return 'break';
      return 'done';
    }

    // Sound beim Phasenwechsel
    let audioCtx = null;
    function getAudioCtx(){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return null;
      if(!audioCtx) audioCtx = new AC();
      if(audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function playChime(phase){
      const ctx = getAudioCtx();
      if(!ctx) return;
      const t = ctx.currentTime;

      const tone = (freq, start, dur=0.2, type='sine', gain=0.28)=>{
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = type; o.frequency.setValueAtTime(freq, t+start);
        o.connect(g).connect(ctx.destination);
        g.gain.setValueAtTime(0.0001, t+start);
        g.gain.linearRampToValueAtTime(gain, t+start+0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t+start+dur);
        o.start(t+start); o.stop(t+start+dur+0.03);
      };

      if(phase==='break'){
        tone(660, 0, 0.18, 'sine', 0.26);
        tone(880, 0.12, 0.18, 'sine', 0.22);
        if('vibrate' in navigator) navigator.vibrate([120,90,120]);
      }else if(phase==='done'){
        tone(740, 0,    0.18, 'triangle', 0.3);
        tone(740, 0.25, 0.18, 'triangle', 0.3);
        tone(740, 0.5,  0.18, 'triangle', 0.3);
        if('vibrate' in navigator) navigator.vibrate([200,100,200,100,200]);
      }else{ // work
        tone(520, 0,    0.14, 'sine', 0.22);
        tone(440, 0.12, 0.16, 'sine', 0.20);
        if('vibrate' in navigator) navigator.vibrate(80);
      }
    }
    function onPhaseChange(phase){
      playChime(phase);
    }

    // Recalc + UI
    function recalc(){
      state.breakSec = clamp(state.breakSec, 0, state.totalSec);
      state.workSec = clamp(state.totalSec - state.breakSec, 0, state.totalSec);
      breakBig.textContent = Math.floor(state.breakSec/60);
      updateUI();
      save();
    }

    function updateDial(elapsed){
      // Rest-Anteile: GRÜN (Auszeit) zuerst, ROT (Arbeitszeit) danach – Start 12 Uhr
      const remRedSec = Math.max(0, state.workSec - elapsed); // verbleibende Arbeitszeit
      const remGreenSec = Math.max(0, state.totalSec - Math.max(elapsed, state.workSec)); // verbleibende Auszeit
      const degGreen = (remGreenSec / 3600) * 360;
      const degRed = (remRedSec / 3600) * 360;

      const cx=110, cy=110, rO=98, rI=74;
      arcGreen.setAttribute('d', degGreen > 0 ? sectorPath(cx,cy,rO,rI,0, degGreen) : '');
      arcRed.setAttribute('d', degRed > 0 ? sectorPath(cx,cy,rO,rI,degGreen, degGreen+degRed) : '');

      // Phase, Farben, Countdown
      if (remRedSec > 0) { // ARBEITSZEIT
        innerFill.setAttribute('fill', getComputedStyle(document.documentElement).getPropertyValue('--red') || '#ef4444');
        centerLabel.textContent = 'ARBEITSZEIT';
        const [mm,ss] = fmtMMSS(remRedSec);
        centerMin.textContent = mm;
        centerSec.textContent = ss;
        centerMin.setAttribute('fill', '#fff');
        centerSec.setAttribute('fill', '#fff');
        dotTop.setAttribute('fill', '#fff');
        dotBottom.setAttribute('fill', '#fff');
      } else if (remGreenSec > 0) { // AUSZEIT
        innerFill.setAttribute('fill', getComputedStyle(document.documentElement).getPropertyValue('--green') || '#16a34a');
        centerLabel.textContent = 'AUSZEIT';
        const [mm,ss] = fmtMMSS(remGreenSec);
        centerMin.textContent = mm;
        centerSec.textContent = ss;
        centerMin.setAttribute('fill', '#fff');
        centerSec.setAttribute('fill', '#fff');
        dotTop.setAttribute('fill', '#fff');
        dotBottom.setAttribute('fill', '#fff');
      } else { // FERTIG
        innerFill.setAttribute('fill', 'transparent');
        centerLabel.textContent = 'FERTIG';
        centerMin.textContent = '00';
        centerSec.textContent = '00';
        centerMin.setAttribute('fill', 'var(--fg-soft)');
        centerSec.setAttribute('fill', 'var(--fg-soft)');
        dotTop.setAttribute('fill', 'var(--fg-soft)');
        dotBottom.setAttribute('fill', 'var(--fg-soft)');
      }

      // Griffe sichtbar, wenn nicht laufend (vor Start oder Pause)
      const showHandles = !state.running;
      handleBoundary.style.display = showHandles ? 'block' : 'none';
      handleTotal.style.display = showHandles ? 'block' : 'none';

      if(showHandles){
        // Schwarzer Griff klebt am ENDE von GRÜN, blauer am ENDE von Gesamt
        const boundaryDeg = (state.breakSec / 3600) * 360; // Ende Grün
        const totalDeg = (state.totalSec / 3600) * 360;    // Ende Gesamt
        const gripR=(rO+rI)/2;
        const pB = polar(cx,cy,gripR, boundaryDeg);
        const pT = polar(cx,cy,gripR, totalDeg);
        handleBoundary.setAttribute('cx', pB.x.toFixed(2));
        handleBoundary.setAttribute('cy', pB.y.toFixed(2));
        handleTotal.setAttribute('cx', pT.x.toFixed(2));
        handleTotal.setAttribute('cy', pT.y.toFixed(2));
      }
    }

    function updateUI(){
      const elapsed=currentElapsed();
      updateDial(elapsed);
      startBtn.textContent = state.running ? 'Pause' : 'Start';
      // Reset-Button nur zeigen, wenn Start-Button sichtbar (d.h. nicht laufend)
      resetBtn.style.display = state.running ? 'none' : 'inline-block';
    }

    // Start/Pause/Timer
    let ticker=null;
    function start(){
      if(!state.started){
        state.started=true;
        state.t0=Date.now();
        state.pausedAcc=0;
        // Anfangsphase setzen (kein Sound bei Start, nur bei Wechsel)
        state.lastPhase = state.workSec>0 ? 'work' : (state.totalSec>0 ? 'break' : 'done');
      } else if(!state.running){
        if(state.pauseStart){
          state.pausedAcc += Date.now()-state.pauseStart;
          state.pauseStart=0;
        }
      }
      if(!state.running){
        state.running=true;
        if(ticker) clearInterval(ticker);
        ticker=setInterval(tick, 200);
      }
      updateUI();
    }

    function pause(){
      if(!state.running) return;
      state.running=false;
      state.pauseStart=Date.now();
      if(ticker) clearInterval(ticker);
      ticker=null;
      updateUI();
    }

    function tick(){
      const elapsed=currentElapsed();
      const phase = getPhase(elapsed);
      if(phase !== state.lastPhase){
        state.lastPhase = phase;
        onPhaseChange(phase);
      }

      if(elapsed>=state.totalSec){
        updateUI();
        clearInterval(ticker);
        ticker=null;
        state.running=false;
        return;
      }
      updateUI();
    }

    // Reset auf 30 Minuten Gesamt, 7 Minuten Auszeit
    function hardResetTo30_7(){
      if(ticker){ clearInterval(ticker); ticker=null; }
      state.started=false;
      state.running=false;
      state.t0=0;
      state.pausedAcc=0;
      state.pauseStart=0;
      state.totalSec = 30*60;   // 30 Minuten Gesamt
      state.breakSec = 7*60;    // 7 Minuten Auszeit
      state.workSec  = state.totalSec - state.breakSec; // 23 Minuten Arbeit
      state.lastPhase = 'work';
      breakBig.textContent = Math.floor(state.breakSec/60);
      updateUI();
      save();
    }

    // Drag-Logik: Griffe „kleben“
    let dragging=false, dragMode=null; // 'boundary' | 'total'

    function nearestHandle(deg){
      const boundaryDeg = (state.breakSec / 3600) * 360; // ENDE GRÜN
      const totalDeg = (state.totalSec / 3600) * 360;    // ENDE GESAMT
      const dB = Math.min(Math.abs(deg-boundaryDeg), 360-Math.abs(deg-boundaryDeg));
      const dT = Math.min(Math.abs(deg-totalDeg), 360-Math.abs(deg-totalDeg));
      return dB <= dT ? 'boundary' : 'total';
    }

    dial.addEventListener('pointerdown', (e)=>{
      if(state.running) return; // nur vor Start oder in Pause
      e.preventDefault();
      const deg = angleFromPointer(e);
      dragMode = nearestHandle(deg);
      dragging=true;
      dial.setPointerCapture?.(e.pointerId);

      if(dragMode==='boundary'){
        const totalDeg = (state.totalSec/3600)*360;
        const d = clamp(deg, 0, totalDeg);
        const breakMin = clamp(Math.round(d/6), 0, Math.floor(state.totalSec/60));
        state.breakSec = breakMin*60; // GRÜN
        state.workSec = state.totalSec - state.breakSec; // ROT
      }else{ // total
        const tMin = clamp(Math.round(deg/6), 1, 60);
        const keepGreen = state.breakSec; // Grün bleibt
        state.totalSec = tMin*60;
        state.breakSec = Math.min(keepGreen, state.totalSec);
        state.workSec = state.totalSec - state.breakSec;
      }
      breakBig.textContent = Math.floor(state.breakSec/60);
      updateUI();
    }, {passive:false});

    dial.addEventListener('pointermove', (e)=>{
      if(!dragging || state.running) return;
      e.preventDefault();
      const deg = angleFromPointer(e);

      if(dragMode==='boundary'){
        const totalDeg = (state.totalSec/3600)*360;
        const d = clamp(deg, 0, totalDeg);
        const breakMin = clamp(Math.round(d/6), 0, Math.floor(state.totalSec/60));
        state.breakSec = breakMin*60; // GRÜN
        state.workSec = state.totalSec - state.breakSec; // ROT
      }else{ // total
        const tMin = clamp(Math.round(deg/6), 1, 60);
        const keepGreen = state.breakSec; // Grün soll gleich bleiben
        state.totalSec = tMin*60;
        state.breakSec = Math.min(keepGreen, state.totalSec);
        state.workSec = state.totalSec - state.breakSec;
      }
      breakBig.textContent = Math.floor(state.breakSec/60);
      updateUI();
    }, {passive:false});

    function endDrag(e){
      if(!dragging) return;
      dragging=false;
      dragMode=null;
      dial.releasePointerCapture?.(e.pointerId);
      save();
    }
    dial.addEventListener('pointerup', endDrag);
    dial.addEventListener('pointercancel', endDrag);
    window.addEventListener('blur', ()=>{
      dragging=false;
      dragMode=null;
    });

    // Auszeit ± (grün) – + vergrößert grün, − verkleinert grün
    function stepBreak(delta){
      const v = clamp(Math.floor(state.breakSec/60)+delta, 0, Math.floor(state.totalSec/60));
      state.breakSec = v*60;
      state.workSec = state.totalSec - state.breakSec;
      breakBig.textContent = v;
      updateUI();
      save();
    }

    function addRepeater(btn, fn){
      let h=null, r=null;
      const down=(e)=>{
        e.preventDefault();
        fn();
        h=setTimeout(()=>{
          r=setInterval(fn,120);
        },400);
      };
      const up=()=>{
        clearTimeout(h);
        clearInterval(r);
        h=null;
        r=null;
      };
      btn.addEventListener('pointerdown', down, {passive:false});
      window.addEventListener('pointerup', up);
      window.addEventListener('pointercancel', up);
      window.addEventListener('blur', up);
    }

    addRepeater(breakPlus, ()=>stepBreak(+1));
    addRepeater(breakMinus, ()=>stepBreak(-1));

    // Buttons
    startBtn.addEventListener('click', ()=> state.running ? pause() : start());
    resetBtn.addEventListener('click', hardResetTo30_7);

    // Init
    updateUI();
  </script>
</body>
</html>
